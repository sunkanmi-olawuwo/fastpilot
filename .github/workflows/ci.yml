name: CI

# Hermetic lint + unit tests for FastPilot. The install is the curated set the
# unit suite actually imports at module load (haystack core, qdrant-client,
# voyageai, redis, numpy) — fastembed/google/opik are lazy-imported and never hit
# without keys. Integration (redis-stack) and live (real keys) tests are excluded
# by default; the 90% coverage gate is a regression guard over app/.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            app/requirements.txt
            pyproject.toml
      # Lint first — needs no project deps and catches the common failures in seconds.
      - name: Ruff
        run: |
          pip install ruff
          ruff check .
      - name: Install backend + test deps (curated — what the unit suite imports)
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi pydantic-settings python-dotenv \
            haystack-ai qdrant-client voyageai redis \
            streamlit requests \
            pytest pytest-asyncio pytest-cov httpx asgi-lifespan fakeredis
      - name: Unit tests (hermetic — integration/live/visual excluded by default)
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=90

  # Mirror the in-repo wiki/ to the GitHub Wiki after tests pass. Push-to-main only
  # (PRs — incl. forks — can't get a write token), and only if tests are green.
  # publish_wiki.py is pure stdlib (no deps) and idempotent: it no-ops when unchanged.
  publish-wiki:
    needs: lint-and-unit
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push to the repo's .wiki.git
    steps:
      - uses: actions/checkout@v5
      - name: Configure git auth for the wiki push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # The script clones .wiki.git into a temp dir, so the checkout's repo-local
          # credentials don't apply — inject the token globally for github.com.
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish wiki
        run: python scripts/publish_wiki.py
